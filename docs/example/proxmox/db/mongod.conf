# Reference /etc/mongod.conf for the Open Poll Plus DB container.
#
# setup-db.in-ct.sh writes this file for you automatically. It is reproduced here
# so you can read/tune it, or use it for a manual install:
#   pct push 5010 db/mongod.conf /etc/mongod.conf
#   # replace __DB_BIND_IP__ with the container's IP, then:
#   systemctl restart mongod

storage:
  dbPath: /var/lib/mongodb
  wiredTiger:
    engineConfig:
      # In an LXC, MongoDB can mis-read the HOST's RAM and over-size its cache.
      # Pin it to MongoDB's own default: 50% of (THIS container's RAM - 1 GB).
      #   2 GB CT -> 0.5     4 GB CT -> 1.5     8 GB CT -> 3.5
      cacheSizeGB: 1.5

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

net:
  port: 27017
  # Loopback for local admin + this container's internal IP for the app CT.
  # NEVER bind 0.0.0.0 — port 27017 must never face the public internet.
  bindIp: 127.0.0.1,__DB_BIND_IP__

security:
  # Require authentication. The app connects with the "openpoll" user.
  authorization: enabled

processManagement:
  timeZoneInfo: /usr/share/zoneinfo

# Notes:
# - WiredTiger journaling is always on in modern MongoDB, so an HA restart
#   (container reboots on another node) recovers cleanly with no data loss.
# - MongoDB 5.0+ requires a CPU with AVX support. Proxmox cluster CPUs have it,
#   but if mongod dies instantly on start, check `lscpu | grep -i avx`.
# - In an UNPRIVILEGED LXC, kernel sysctls (vm.max_map_count, transparent huge
#   pages) belong to the Proxmox HOST, not the container. If mongod warns about
#   max_map_count, set it on the host node, e.g.:
#     echo 'vm.max_map_count=262144' > /etc/sysctl.d/99-mongodb.conf && sysctl --system
#   Running `sysctl -w ...` INSIDE the unprivileged CT will fail — that's expected.
