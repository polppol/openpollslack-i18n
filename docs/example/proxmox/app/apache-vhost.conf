# ALTERNATIVE proxy option — most deployments do NOT need this file.
# The bundled setup runs Caddy INSIDE the App container (see app/install-caddy.in-ct.sh
# + app/Caddyfile), so the app fronts itself with HTTPS and nothing external is
# required. Use this Apache vhost ONLY if you instead front the app from a
# SEPARATE, already-running Apache box that proxies across the LAN to the CT.
#
# Want a SEPARATE reverse proxy but using Caddy (not Apache)? The kit ships that
# as the SPLIT topology — a dedicated rproxy CT — see rproxy/Caddyfile.multi +
# rproxy/deploy-rproxy-to-ct.sh. This Apache vhost is the equivalent for an
# existing Apache box you'd rather reuse.
#
# It fronts MANY backend Node apps behind one Apache reverse proxy using
# /node/<label>/ path prefixes (one ProxyPass / ProxyPassReverse pair per app).
# Open Poll Plus runs in the App container on <APP_CT_IP>:5000, published here as
#   https://poll.example.com/node/5000/...
#
#   Slack events  request URL : https://poll.example.com/node/5000/slack/events
#   Slash commands request URL: https://poll.example.com/node/5000/slack/commands
#   Interactivity request URL : https://poll.example.com/node/5000/slack/actions
#   OAuth redirect URL        : https://poll.example.com/node/5000/slack/oauth_redirect
#   Install (browser)         : https://poll.example.com/node/5000/slack/install
#   Health check              : https://poll.example.com/node/5000/healthz
#
# The TRAILING SLASH on both sides of ProxyPass is what strips the /node/5000/
# prefix before the backend sees it:
#   /node/5000/slack/events  ->  http://<APP_CT_IP>:5000/slack/events
# Bolt then receives the plain /slack/... paths it expects. (Keep the trailing
# slashes — without them the prefix is NOT stripped and Slack URLs break.)

<VirtualHost *:443>
    ServerName  poll.example.com
    # ... your existing DocumentRoot / SSLCertificateFile / SSLCertificateKeyFile ...

    SSLEngine on
    SSLProxyEngine on
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyVia Full

    # ── Open Poll Plus (App container, port 5000) ───────────────────────────
    # IMPORTANT for Slack: forward the request body UNCHANGED. Slack signs each
    # request and the app verifies that signature against the raw body, so do
    # NOT enable mod_security, mod_deflate on input, or any body/charset
    # rewriting on these paths — every Slack request would fail otherwise.
    #
    # Expose ONLY the paths the app actually serves. Everything else under
    # /node/5000/ is blocked, so scanners/probes never reach the backend.
    ProxyPass        /node/5000/slack/  http://<APP_CT_IP>:5000/slack/
    ProxyPassReverse /node/5000/slack/  http://<APP_CT_IP>:5000/slack/
    ProxyPass        /node/5000/healthz http://<APP_CT_IP>:5000/healthz
    ProxyPass        /node/5000/ping    http://<APP_CT_IP>:5000/ping

    # Return 403 for anything else under /node/5000/. The negative lookahead
    # lets only slack/, healthz and ping through; all other paths are denied.
    <LocationMatch "^/node/5000/(?!slack/|healthz|ping)">
        Require all denied
    </LocationMatch>

    # ── Add more apps the same way — one pair each. The /node/<label>/ segment
    #    is arbitrary; below we reuse each backend's port number for clarity.
    # ProxyPass        /node/3001/ http://<OTHER_CT_IP>:3001/
    # ProxyPassReverse /node/3001/ http://<OTHER_CT_IP>:3001/
    #
    # ProxyPass        /node/3002/ http://<OTHER_CT_IP>:3002/
    # ProxyPassReverse /node/3002/ http://<OTHER_CT_IP>:3002/

    # Optional: restrict a sensitive path of an app to the LAN only — the way
    # your current config guards /config. Apache 2.4 syntax:
    # <Location /node/5000/healthz>
    #     Require ip 127.0.0.1 10.100.51.0/24
    # </Location>
    # (Apache 2.2 / mod_access_compat equivalent: Order Deny,Allow / Deny from
    #  all / Allow from 127.0.0.1 10.100.51.)

    RewriteEngine On
</VirtualHost>

# Notes
# - The /node/<label>/ segment is arbitrary — it can be any string and does NOT
#   have to equal the backend port. We reuse the port number (here 5000) only
#   because it makes the mapping easy to read.
# - The path prefix does NOT affect Slack request-signature checks (the
#   signature covers the timestamp + raw body, not the URL), so /node/5000/ is
#   transparent to verification once the prefix is stripped.
# - The App container only needs to listen on plain HTTP on the LAN; TLS is
#   terminated here at the proxy. Keep <APP_CT_IP>:5000 reachable from this
#   proxy host only (firewall / VLAN), not from the public internet.
